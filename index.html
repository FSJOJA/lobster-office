<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出海虾像素办公室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #7c5bf5;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 8px;
        }
        
        /* 办公室容器 */
        .office {
            width: 900px;
            height: 500px;
            background: #2d2d44;
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(124, 91, 245, 0.3);
        }
        
        /* 木地板 */
        .floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: repeating-linear-gradient(
                90deg,
                #8b6914 0px,
                #8b6914 20px,
                #6b4e0a 20px,
                #6b4e0a 40px
            );
            border-top: 4px solid #4a3728;
        }
        
        /* 墙壁 */
        .wall {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 100px;
            background: linear-gradient(180deg, #3d3d5c 0%, #2d2d44 100%);
        }
        
        /* 左侧：吴家明工作区 */
        .workspace-left {
            position: absolute;
            left: 40px;
            bottom: 100px;
            width: 220px;
            height: 280px;
        }
        
        /* 办公桌 */
        .desk {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 180px;
            height: 80px;
            background: #5c4033;
            border: 3px solid #3e2723;
            border-radius: 4px;
        }
        
        .desk::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 20px;
            width: 140px;
            height: 50px;
            background: #1a1a2e;
            border: 3px solid #4a5568;
            border-radius: 4px;
        }
        
        /* 电脑屏幕 */
        .monitor {
            position: absolute;
            top: -35px;
            left: 40px;
            width: 100px;
            height: 40px;
            background: #0ea5e9;
            border: 2px solid #0284c7;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 10;
        }
        
        .monitor::before {
            content: '💻';
        }
        
        /* 椅子 */
        .chair {
            position: absolute;
            bottom: 20px;
            left: 60px;
            width: 60px;
            height: 70px;
            background: #4a5568;
            border: 3px solid #2d3748;
            border-radius: 8px 8px 0 0;
        }
        
        .chair::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 5px;
            width: 50px;
            height: 25px;
            background: #718096;
            border-radius: 8px 8px 0 0;
        }
        
        /* 吴家明 */
        .person-wujiaming {
            position: absolute;
            bottom: 60px;
            left: 70px;
            width: 50px;
            height: 70px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 20;
        }
        
        .person-wujiaming:hover {
            transform: scale(1.1);
        }
        
        .person-wujiaming .head {
            width: 40px;
            height: 40px;
            background: #f6ad55;
            border-radius: 50%;
            margin: 0 auto;
            border: 3px solid #000;
            position: relative;
        }
        
        .person-wujiaming .head::before {
            content: '👨';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }
        
        .person-wujiaming .body {
            width: 44px;
            height: 30px;
            background: #3b82f6;
            margin: -5px auto 0;
            border-radius: 8px 8px 0 0;
            border: 3px solid #1d4ed8;
        }
        
        /* 白板 */
        .whiteboard {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100px;
            height: 80px;
            background: #f8fafc;
            border: 4px solid #64748b;
            border-radius: 4px;
        }
        
        .whiteboard::before {
            content: '📋';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
        }
        
        /* 绿植 */
        .plant-left {
            position: absolute;
            bottom: 80px;
            left: 0;
            font-size: 40px;
        }
        
        /* 中间：出海虾休息区 */
        .lounge {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 100px;
            width: 200px;
            height: 200px;
        }
        
        /* 紫色沙发 */
        .sofa {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 180px;
            height: 60px;
            background: #7c3aed;
            border: 3px solid #5b21b6;
            border-radius: 12px 12px 0 0;
        }
        
        .sofa::before {
            content: '';
            position: absolute;
            top: -25px;
            left: 10px;
            right: 10px;
            height: 30px;
            background: #8b5cf6;
            border-radius: 8px 8px 0 0;
            border: 3px solid #5b21b6;
            border-bottom: none;
        }
        
        /* 出海虾 */
        .lobster {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            cursor: pointer;
            animation: float 2s ease-in-out infinite;
            z-index: 20;
        }
        
        .lobster:hover {
            animation: wiggle 0.5s ease-in-out infinite;
        }
        
        .lobster-body {
            width: 60px;
            height: 50px;
            background: #ef4444;
            border-radius: 50%;
            margin: 0 auto;
            border: 3px solid #991b1b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            position: relative;
        }
        
        .lobster-body::before {
            content: '🦞';
        }
        
        .lobster-claw {
            position: absolute;
            width: 20px;
            height: 25px;
            background: #ef4444;
            border: 2px solid #991b1b;
            border-radius: 50%;
            top: 15px;
        }
        
        .claw-left {
            left: -10px;
            transform: rotate(-30deg);
        }
        
        .claw-right {
            right: -10px;
            transform: rotate(30deg);
        }
        
        /* 水晶球 */
        .crystal-ball {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #a855f7, #5b21b6);
            border-radius: 50%;
            border: 3px solid #7c3aed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            animation: glow 2s ease-in-out infinite;
        }
        
        .crystal-ball::before {
            content: '🔮';
        }
        
        /* 咖啡桌 */
        .coffee-table {
            position: absolute;
            bottom: 70px;
            left: 20px;
            width: 50px;
            height: 30px;
            background: #4a5568;
            border: 2px solid #2d3748;
            border-radius: 4px;
        }
        
        .coffee-table::before {
            content: '☕';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
        }
        
        /* 右侧：女生工作区 */
        .workspace-right {
            position: absolute;
            right: 40px;
            bottom: 100px;
            width: 240px;
            height: 280px;
        }
        
        /* 两张并排的桌子 */
        .desk-right1 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 70px;
            background: #ec4899;
            border: 3px solid #db2777;
            border-radius: 4px;
        }
        
        .desk-right1::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 10px;
            width: 80px;
            height: 40px;
            background: #1a1a2e;
            border: 3px solid #db2777;
            border-radius: 4px;
        }
        
        .desk-right2 {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100px;
            height: 70px;
            background: #a855f7;
            border: 3px solid #7c3aed;
            border-radius: 4px;
        }
        
        .desk-right2::before {
            content: '';
            position: absolute;
            top: -35px;
            right: 10px;
            width: 80px;
            height: 40px;
            background: #1a1a2e;
            border: 3px solid #7c3aed;
            border-radius: 4px;
        }
        
        /* 铠溪 */
        .person-kaixi {
            position: absolute;
            bottom: 50px;
            left: 25px;
            width: 45px;
            height: 65px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 20;
        }
        
        .person-kaixi:hover {
            transform: scale(1.1);
        }
        
        .person-kaixi .head {
            width: 36px;
            height: 36px;
            background: #fecaca;
            border-radius: 50%;
            margin: 0 auto;
            border: 3px solid #000;
            position: relative;
        }
        
        .person-kaixi .head::before {
            content: '👩';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        
        .person-kaixi .body {
            width: 40px;
            height: 28px;
            background: #ec4899;
            margin: -5px auto 0;
            border-radius: 8px 8px 0 0;
            border: 3px solid #db2777;
        }
        
        /* 惠敏 */
        .person-huimin {
            position: absolute;
            bottom: 50px;
            right: 25px;
            width: 45px;
            height: 65px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 20;
        }
        
        .person-huimin:hover {
            transform: scale(1.1);
        }
        
        .person-huimin .head {
            width: 36px;
            height: 36px;
            background: #fde68a;
            border-radius: 50%;
            margin: 0 auto;
            border: 3px solid #000;
            position: relative;
        }
        
        .person-huimin .head::before {
            content: '👩‍💼';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        
        .person-huimin .body {
            width: 40px;
            height: 28px;
            background: #a855f7;
            margin: -5px auto 0;
            border-radius: 8px 8px 0 0;
            border: 3px solid #7c3aed;
        }
        
        /* 服务器机柜 */
        .server-rack {
            position: absolute;
            top: 20px;
            right: 0;
            width: 60px;
            height: 120px;
            background: #1f2937;
            border: 3px solid #374151;
            border-radius: 4px;
        }
        
        .server-rack::before {
            content: '🖥️';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
        }
        
        .server-rack::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            height: 60px;
            background: repeating-linear-gradient(
                0deg,
                #374151 0px,
                #374151 8px,
                #1f2937 8px,
                #1f2937 16px
            );
        }
        
        /* 书架 */
        .bookshelf {
            position: absolute;
            top: 20px;
            right: 70px;
            width: 50px;
            height: 100px;
            background: #5c4033;
            border: 3px solid #3e2723;
            border-radius: 4px;
        }
        
        .bookshelf::before {
            content: '📚';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }
        
        /* 名牌标签 */
        .name-tag {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
        
        .tag-wujiaming {
            left: 60px;
            bottom: 30px;
        }
        
        .tag-lobster {
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
            background: rgba(124, 91, 245, 0.9);
        }
        
        .tag-kaixi {
            left: 15px;
            bottom: 20px;
        }
        
        .tag-huimin {
            right: 15px;
            bottom: 20px;
        }
        
        /* 底部输入框 */
        .input-area {
            width: 900px;
            margin-top: 20px;
            background: #2d2d44;
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .input-area input {
            flex: 1;
            background: #1a1a2e;
            border: 2px solid #4a4a6a;
            border-radius: 6px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        .input-area input::placeholder {
            color: #64748b;
        }
        
        .input-area input:focus {
            border-color: #7c5bf5;
        }
        
        .input-area button {
            background: #7c5bf5;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .input-area button:hover {
            background: #6b4ee6;
        }
        
        /* 动画 */
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }
        
        @keyframes wiggle {
            0%, 100% { transform: translateX(-50%) rotate(-5deg); }
            50% { transform: translateX(-50%) rotate(5deg); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px #a855f7; }
            50% { box-shadow: 0 0 20px #a855f7, 0 0 30px #7c3aed; }
        }
        
        /* 对话框 */
        .dialog-box {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 2px solid #7c5bf5;
            border-radius: 12px;
            padding: 20px 30px;
            max-width: 500px;
            display: none;
            z-index: 100;
        }
        
        .dialog-box.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦞 出海虾像素办公室</h1>
    </div>
    
    <div class="office">
        <!-- 墙壁 -->
        <div class="wall"></div>
        
        <!-- 地板 -->
        <div class="floor"></div>
        
        <!-- 左侧：吴家明工作区 -->
        <div class="workspace-left">
            <div class="whiteboard"></div>
            <div class="plant-left">🪴</div>
            <div class="desk">
                <div class="monitor"></div>
            </div>
            <div class="chair"></div>
            <div class="person-wujiaming" onclick="showDialog('吴家明', '正在写代码...')">
                <div class="head"></div>
                <div class="body"></div>
            </div>
            <div class="name-tag tag-wujiaming">👨‍💻 吴家明 · 技术</div>
        </div>
        
        <!-- 中间：出海虾休息区 -->
        <div class="lounge">
            <div class="sofa"></div>
            <div class="coffee-table"></div>
            <div class="lobster" onclick="showDialog('出海虾', '随时待命！有什么可以帮你的？')">
                <div class="lobster-claw claw-left"></div>
                <div class="lobster-claw claw-right"></div>
                <div class="lobster-body"></div>
            </div>
            <div class="crystal-ball" onclick="showDialog('水晶球', '🔮 让我想想...')"></div>
            <div class="name-tag tag-lobster">🦞 出海虾 · AI助理</div>
        </div>
        
        <!-- 右侧：女生工作区 -->
        <div class="workspace-right">
            <div class="bookshelf"></div>
            <div class="server-rack"></div>
            <div class="desk-right1"></div>
            <div class="desk-right2"></div>
            <div class="person-kaixi" onclick="showDialog('铠溪', '正在处理运营事务...')">
                <div class="head"></div>
                <div class="body"></div>
            </div>
            <div class="person-huimin" onclick="showDialog('惠敏', '正在核对财务报表...')">
                <div class="head"></div>
                <div class="body"></div>
            </div>
            <div class="name-tag tag-kaixi">👩‍💼 铠溪 · 营运</div>
            <div class="name-tag tag-huimin">👩‍💻 惠敏 · 财务</div>
        </div>
    </div>
    
    <!-- 底部输入框 -->
    <div class="input-area">
        <input type="text" id="taskInput" placeholder="可以描述任务或提问任何问题...">
        <button onclick="sendTask()">发送</button>
    </div>
    
    <!-- 对话框 -->
    <div class="dialog-box" id="dialogBox">
        <h3 id="dialogTitle"></h3>
        <p id="dialogContent"></p>
    </div>
    
    <script>
        function showDialog(title, content) {
            const dialog = document.getElementById('dialogBox');
            document.getElementById('dialogTitle').textContent = title;
            document.getElementById('dialogContent').textContent = content;
            dialog.classList.add('active');
            setTimeout(() => {
                dialog.classList.remove('active');
            }, 3000);
        }
        
        function sendTask() {
            const input = document.getElementById('taskInput');
            const task = input.value.trim();
            if (task) {
                showDialog('出海虾', '收到任务：' + task + '\n正在处理中...');
                input.value = '';
            }
        }
        
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendTask();
            }
        });
    </script>
</body>
</html>
